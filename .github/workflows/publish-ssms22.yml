name: Publish SSMS 22 extension

# Builds the RightWaySqlFormatter.SSMS22 VSIX and (optionally) publishes it to the
# community Open VSIX Gallery (and the SSMS-filtered instance). Manual trigger only.
# By default this is a DRY RUN: it builds and uploads the .vsix as a workflow
# artifact for inspection. Tick "publish" when you actually want to ship — publishing
# is token-less and does not require signing; the galleries read metadata from the
# .vsix manifest.
on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish to the VSIX galleries (unticked = build-only dry run)
        type: boolean
        default: false

jobs:
  publish:
    runs-on: windows-latest
    # id-token: OIDC federated login to Azure for Trusted Signing (no stored password)
    permissions:
      id-token: write
      contents: read
    # secrets.* isn't readable in step-level `if:` — mirror the gate secret into
    # env so the signing steps can test whether Azure signing is configured.
    env:
      SIGNING_CONFIGURED: ${{ secrets.AZURE_CLIENT_ID }}
    steps:
      - uses: actions/checkout@v5

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v3

      # Give each published build a distinct version (the gallery keys on the
      # manifest Identity Version). CAREFUL: the manifest carries Version="2.0.0"
      # TWICE — on <Identity> (bump this) and on <PackageManifest> (the vsx SCHEMA
      # version, must stay 2.0.0). Anchor on the extension GUID so ONLY the
      # Identity is rewritten; the [22.0,)/[17.0,)/[4.8,) ranges are untouched too.
      - name: Stamp VSIX version 2.1.${{ github.run_number }}
        shell: pwsh
        run: |
          $m = 'RightWaySqlFormatter.SSMS22/source.extension.vsixmanifest'
          $text = Get-Content $m -Raw
          $pattern = 'Id="e857c020-26ea-4b6f-b0d0-d97fb572ee81" Version="2\.0\.0"'
          $new = 'Id="e857c020-26ea-4b6f-b0d0-d97fb572ee81" Version="2.1.${{ github.run_number }}"'
          $updated = [regex]::Replace($text, $pattern, $new)
          if ($updated -eq $text) { throw 'Identity version stamp did not match - manifest layout changed?' }
          if ($updated -notmatch '<PackageManifest Version="2\.0\.0"') { throw 'PackageManifest schema version was altered - aborting.' }
          Set-Content $m -Value $updated -NoNewline
          Write-Host 'Stamped Identity version = 2.1.${{ github.run_number }} (schema version 2.0.0 preserved)'

      - name: Restore
        run: msbuild RightWaySqlFormatter.SSMS22/RightWaySqlFormatter.SSMS22.csproj /t:Restore /p:Configuration=Release

      - name: Build VSIX
        run: msbuild RightWaySqlFormatter.SSMS22/RightWaySqlFormatter.SSMS22.csproj /t:Build /p:Configuration=Release /p:DeployExtension=false

      # SDK-style projects append the TFM to the output dir (bin/Release/net48/),
      # so resolve the built .vsix rather than hard-coding the path.
      - name: Locate built VSIX
        id: vsix
        shell: pwsh
        run: |
          $f = Get-ChildItem RightWaySqlFormatter.SSMS22/bin/Release -Recurse -Filter RightWaySqlFormatter.SSMS22.vsix | Select-Object -First 1
          if (-not $f) { throw 'RightWaySqlFormatter.SSMS22.vsix not found under bin/Release' }
          "path=$($f.FullName)" | Out-File $env:GITHUB_OUTPUT -Append
          Write-Host "Found VSIX: $($f.FullName) ($([math]::Round($f.Length/1KB)) KB)"

      # ---- Digital signature (Azure Trusted Signing) --------------------------
      # Runs only once the Azure secrets exist; until then these steps are skipped
      # and the VSIX ships unsigned. One-time Azure setup required (see
      # docs/windows-ssms-dev.md): Trusted Signing account + identity validation +
      # certificate profile, plus an Entra app registration with a GitHub federated
      # credential and the "Trusted Signing Certificate Profile Signer" role.
      # Secrets: AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_SUBSCRIPTION_ID,
      # TRUSTED_SIGNING_ENDPOINT (e.g. https://eus.codesigning.azure.net),
      # TRUSTED_SIGNING_ACCOUNT, TRUSTED_SIGNING_CERT_PROFILE.
      - name: Azure login (OIDC)
        if: ${{ env.SIGNING_CONFIGURED != '' }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign VSIX (Trusted Signing)
        if: ${{ env.SIGNING_CONFIGURED != '' }}
        shell: pwsh
        run: |
          dotnet tool install --global sign --prerelease
          sign code trusted-signing "${{ steps.vsix.outputs.path }}" `
            --trusted-signing-endpoint "${{ secrets.TRUSTED_SIGNING_ENDPOINT }}" `
            --trusted-signing-account "${{ secrets.TRUSTED_SIGNING_ACCOUNT }}" `
            --trusted-signing-certificate-profile "${{ secrets.TRUSTED_SIGNING_CERT_PROFILE }}" `
            --description "Right Way SQL Formatter - SSMS 22 Extension" `
            --description-url "https://github.com/BadMonkeySoftware/right-way-sql-formatter"
      # --------------------------------------------------------------------------

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v6
        with:
          name: RightWaySqlFormatter.SSMS22.vsix
          path: ${{ steps.vsix.outputs.path }}
          if-no-files-found: error

      # readme: rendered on the gallery listing page (absolute image URLs required).
      # manage-token: password for the gallery's /extension/<id>/manage page — set the
      # VSIXGALLERY_MANAGE_TOKEN repo secret BEFORE the first publish (Settings ▸
      # Secrets and variables ▸ Actions) so nobody else can delete the listing.
      - name: Publish to Open VSIX Gallery
        if: ${{ inputs.publish }}
        uses: madskristensen/publish-vsixgallery@v1
        with:
          vsix-file: ${{ steps.vsix.outputs.path }}
          readme: https://raw.githubusercontent.com/BadMonkeySoftware/right-way-sql-formatter/main/RightWaySqlFormatter.SSMS22/README.md
          manage-token: ${{ secrets.VSIXGALLERY_MANAGE_TOKEN }}

      - name: Publish to Open SSMS VSIX Gallery
        if: ${{ inputs.publish }}
        uses: madskristensen/publish-vsixgallery@v1
        with:
          vsix-file: ${{ steps.vsix.outputs.path }}
          readme: https://raw.githubusercontent.com/BadMonkeySoftware/right-way-sql-formatter/main/RightWaySqlFormatter.SSMS22/README.md
          manage-token: ${{ secrets.VSIXGALLERY_MANAGE_TOKEN }}
          gallery-url: https://ssmsgallery.azurewebsites.net
